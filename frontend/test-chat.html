<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welfare Bot - Test Lab</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bot-bg: #f1f3f4;
            --user-bg: #dcf8c6;
            --text-dark: #333;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #e5ddd5;
            display: flex;
            height: 100vh;
        }

        /* Layout */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            background: var(--white);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Header */
        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-actions { display: flex; gap: 8px; }
        select, button.reset-btn {
            padding: 5px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        button.reset-btn { background: #e74c3c; color: white; font-weight: bold; }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f0f0f0;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
        }
        .bot {
            align-self: flex-start;
            background: var(--bot-bg);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
            font-size: 17px; /* Larger for Indic scripts */
        }
        .user {
            align-self: flex-end;
            background: var(--user-bg);
            color: var(--text-dark);
            border-bottom-right-radius: 2px;
        }

        /* Typing Indicator */
        #typing {
            display: none;
            font-style: italic;
            color: #777;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* Input Area */
        #input-area {
            padding: 15px;
            background: #fff;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        button.send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Test Panel (Desktop Only) */
        #test-panel {
            width: 250px;
            background: #f9f9f9;
            border-left: 1px solid #ccc;
            padding: 20px;
            display: none;
        }
        @media (min-width: 800px) {
            #test-panel { display: block; }
        }
        .test-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #eee;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
        }
        .test-btn:hover { background: #e0e0e0; }

        /* Mobile Adjustments */
        @media (max-width: 500px) {
            #app-container { width: 100%; max-width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <span>Welfare Bot</span>
        <div class="header-actions">
            <select id="lang-select">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="bn">Bengali</option>
                <option value="ta">Tamil</option>
                <option value="mr">Marathi</option>
            </select>
            <button class="reset-btn" onclick="resetSession()">Reset</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble bot">नमस्ते! कृपया अपनी भाषा चुनें और शुरू करने के लिए "start" टाइप करें।</div>
    </div>
    
    <div id="typing" style="padding: 0 15px;">Bot is thinking...</div>

    <form id="input-area">
        <input type="text" id="user-input" placeholder="Type message..." autocomplete="off">
        <button type="submit" class="send-btn">➔</button>
    </form>
</div>

<div id="test-panel">
    <h3>Test Panel</h3>
    <button class="test-btn" onclick="quickSend('start')">▶️ start</button>
    <button class="test-btn" onclick="quickSend('1')">1️⃣ Choice 1</button>
    <button class="test-btn" onclick="quickSend('2')">2️⃣ Choice 2</button>
    <button class="test-btn" onclick="quickSend('मैं किसान हूँ')">🌾 मैं किसान हूँ</button>
    <button class="test-btn" onclick="quickSend('दस्तावेज़ क्या चाहिए')">📄 दस्तावेज़ क्या चाहिए</button>
    <button class="test-btn" onclick="quickSend('I have 2 acres of land')">🗺️ I have 2 acres</button>
    <button class="test-btn" onclick="quickSend('PM-KISAN के बारे में बताओ')">ℹ️ PM-KISAN info</button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const inputArea = document.getElementById('input-area');
    const userInput = document.getElementById('user-input');
    const langSelect = document.getElementById('lang-select');
    const typing = document.getElementById('typing');
    
    const API_URL = 'http://localhost:3000/chat';
    const RESET_URL = 'http://localhost:3000/reset';
    const userId = 'test-user-' + Math.floor(Math.random() * 10000);

    function appendMessage(text, role) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage(text) {
        if (!text) return;
        appendMessage(text, 'user');
        userInput.value = '';
        
        typing.style.display = 'block';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, message: text })
            });
            const data = await response.json();
            typing.style.display = 'none';
            if (data.reply) {
                appendMessage(data.reply, 'bot');
            }
        } catch (error) {
            typing.style.display = 'none';
            appendMessage("Error: Cannot connect to server. Make sure node backend/server.js is running.", 'bot');
        }
    }

    async function resetSession() {
        try {
            await fetch(RESET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId })
            });
            chatWindow.innerHTML = '<div class="bubble bot">Session Reset. Type "start" to begin again.</div>';
        } catch (e) {
            alert("Reset failed");
        }
    }

    function quickSend(text) {
        sendMessage(text);
    }

    inputArea.onsubmit = (e) => {
        e.preventDefault();
        sendMessage(userInput.value.trim());
    };
</script>

</body>
</html>
