<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welfare Bot - Multilingual Support</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 400px;
            height: 600px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }
        .user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
        }
        .bot {
            align-self: flex-start;
            background: #ecf0f1;
            color: var(--primary);
        }
        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>Rural Welfare Bot</header>
    <div id="messages">
        <div class="message bot">नमस्ते! मैं आपकी सरकारी योजनाओं के बारे में मदद कर सकता हूँ। आप मुझसे हिंदी या अंग्रेजी में पूछ सकते हैं।</div>
    </div>
    <form id="input-area">
        <input type="text" id="user-input" placeholder="Type your query..." autocomplete="off">
        <button type="submit">Send</button>
    </form>
</div>

<script>
    const form = document.getElementById('input-area');
    const input = document.getElementById('user-input');
    const messages = document.getElementById('messages');

    function appendMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        try {
            const response = await fetch('http://localhost:3000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            appendMessage(data.reply, 'bot');
        } catch (error) {
            appendMessage("Error: Could not connect to the backend.", 'bot');
        }
    };
</script>

</body>
</html>
